# yaml-language-server: $schema=https://unpkg.com/@powersync/service-sync-rules@latest/schema/sync_rules.json
#
# Sync rules: which rows from Postgres get synced down to devices.
# Note: changes here require restarting the powersync container to take effect.
#
# Each device only ever receives the notes belonging to the user_id in its own
# login token — auth.user_id() reads the JWT's `sub` claim directly, so no custom
# claim is needed. auto_subscribe still works here because the filter comes from
# the trusted token (an "auth parameter"), not a client-supplied value.

config:
  edition: 3

streams:
  my_notes:
    auto_subscribe: true
    query: SELECT * FROM notes WHERE user_id = auth.user_id()
