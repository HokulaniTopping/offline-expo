# yaml-language-server: $schema=https://unpkg.com/@powersync/service-sync-rules@latest/schema/sync_rules.json
#
# Sync rules: which rows from Postgres get synced down to devices.
# Note: changes here require restarting the powersync container to take effect.
#
# This is intentionally a single global bucket with no per-user filtering — every
# connected device sees every note. That's fine for this demo; a real multi-user
# app would partition by owner_id (see the docs for parameterized streams).

config:
  edition: 3

streams:
  global:
    auto_subscribe: true
    queries:
      - SELECT * FROM notes
