services:
  # Source database — the app's actual data. This is what PowerSync replicates from.
  pg-db:
    image: postgres:18
    restart: always
    environment:
      - POSTGRES_USER=${PG_DATABASE_USER}
      - POSTGRES_DB=${PG_DATABASE_NAME}
      - POSTGRES_PASSWORD=${PG_DATABASE_PASSWORD}
      - PGPORT=${PG_DATABASE_PORT}
    volumes:
      - pg_data:/var/lib/postgresql
      - ./init-scripts:/docker-entrypoint-initdb.d
    ports:
      - "${PG_DATABASE_PORT}:${PG_DATABASE_PORT}"
    # Logical replication is how PowerSync streams changes out of Postgres.
    command: ["postgres", "-c", "wal_level=logical"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_DATABASE_USER} -d ${PG_DATABASE_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # PowerSync's own storage for sync bucket state/operation history. Separate database,
  # nothing to do with the app's data — this could be Mongo instead, but a second
  # Postgres keeps the whole stack to one engine for a template meant to be reused.
  pg-storage:
    image: postgres:18
    restart: always
    environment:
      - POSTGRES_USER=${PG_STORAGE_DATABASE_USER}
      - POSTGRES_DB=${PG_STORAGE_DATABASE_NAME}
      - POSTGRES_PASSWORD=${PG_STORAGE_DATABASE_PASSWORD}
      - PGPORT=${PG_STORAGE_DATABASE_PORT}
    volumes:
      - pg_storage_data:/var/lib/postgresql
    ports:
      - "${PG_STORAGE_DATABASE_PORT}:${PG_STORAGE_DATABASE_PORT}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_STORAGE_DATABASE_USER} -d ${PG_STORAGE_DATABASE_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  powersync:
    restart: unless-stopped
    image: journeyapps/powersync-service:latest
    command: ["start", "-r", "unified"]
    depends_on:
      pg-db:
        condition: service_healthy
      pg-storage:
        condition: service_healthy
    volumes:
      - ./config:/config
    environment:
      POWERSYNC_CONFIG_PATH: /config/service.yaml
      NODE_OPTIONS: --max-old-space-size=1000
      PS_DATA_SOURCE_URI: ${PS_DATA_SOURCE_URI}
      PS_STORAGE_SOURCE_URI: ${PS_STORAGE_SOURCE_URI}
      PS_PORT: ${PS_PORT}
      # Inline JWKS values (see scripts/generate-keys.mjs) — lets the service verify
      # client JWTs without needing a separate auth server running for this demo.
      PS_JWK_KID: ${PS_JWK_KID}
      PS_JWK_N: ${PS_JWK_N}
      PS_JWK_E: ${PS_JWK_E}
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:${PS_PORT}/probes/liveness').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))",
        ]
      interval: 5s
      timeout: 1s
      retries: 15
    ports:
      - "${PS_PORT}:${PS_PORT}"

  # Thin API the app's PowerSync connector talks to: mints the JWT clients connect
  # with (fetchCredentials) and applies offline writes to pg-db (uploadData). Self-hosted
  # PowerSync never accepts writes directly from a client — this is that write path.
  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      pg-db:
        condition: service_healthy
    environment:
      # Overrides db.ts's localhost default to the docker network alias.
      PG_DATABASE_HOST: pg-db
      PG_DATABASE_PORT: ${PG_DATABASE_PORT}
      PG_DATABASE_USER: ${PG_DATABASE_USER}
      PG_DATABASE_PASSWORD: ${PG_DATABASE_PASSWORD}
      PG_DATABASE_NAME: ${PG_DATABASE_NAME}
      BACKEND_PORT: ${BACKEND_PORT}
      PS_PUBLIC_URL: ${PS_PUBLIC_URL}
      PRIVATE_KEY_PATH: /app/keys/private.jwk.json
      PUBLIC_KEY_PATH: /app/keys/public.jwk.json
    volumes:
      - ./keys:/app/keys:ro
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"

volumes:
  pg_data:
  pg_storage_data:
